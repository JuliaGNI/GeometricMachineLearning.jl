name: Documentation

on:
  push:
    branches:
      - main
      - make_mac_docs
  pull_request:

jobs:
  build:
    name: LatexDocsUbuntu
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          sudo apt-get install poppler-utils
          sudo apt-get install texlive-xetex
          sudo apt-get install texlive-science
          make linux -C docs/src/tikz
      - uses: julia-actions/setup-julia@latest
        with:
          version: '1'
      - run: |
          cd docs
          make install_brenier_two_fluid test_docs
          cd .. 
          julia --project=latex_linux docs/make.jl html_output
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCUMENTER_KEY: ${{ secrets.DOCUMENTER_KEY }}
  build:
    name: LatexDocsMac
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          brew update
          brew install texlive-xetex 
          brew install texlive-science
          make mac -C docs/src/tikz
      - uses: julia-actions/setup-julia@latest
        with:
          version: '1'
      - run: |
          cd docs
          make install_brenier_two_fluid test_docs
          cd .. 
          julia --project=latex_mac docs/make.jl html_output
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCUMENTER_KEY: ${{ secrets.DOCUMENTER_KEY }}