name: Documentation

on:
  push:
    branches:
      - main
      - make_mac_docs
  pull_request:

jobs:
  LatexDocsUbuntu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          sudo apt-get install imagemagick
          sudo apt-get install poppler-utils
          sudo apt-get install texlive-xetex
          sudo apt-get install texlive-science
          make linux -C docs/src/tikz
      - uses: julia-actions/setup-julia@latest
        with:
          version: '1'
      - run: |
          cd docs
          make install_brenier_two_fluid test_docs
          cd .. 
          julia --project=latex_linux docs/make.jl html_output
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCUMENTER_KEY: ${{ secrets.DOCUMENTER_KEY }}
  LatexDocsMac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: teatimeguest/setup-texlive-action@v3
        with:
          packages: scheme-basic
      - run: |
          tlmgr install xetex
          tlmgr install pgf
          tlmgr install standalone
          tlmgr install filehook
          tlmgr install neuralnetwork
          tlmgr install pgfplots
      - run: make mac -C docs/src/tikz
      - uses: julia-actions/setup-julia@latest
        with:
          version: '1'
      - run: |
          cd docs
          make install_brenier_two_fluid test_docs
          cd .. 
          julia --project=latex_mac docs/make.jl html_output
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCUMENTER_KEY: ${{ secrets.DOCUMENTER_KEY }}